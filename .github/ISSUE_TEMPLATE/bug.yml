name: Bug Report
description: Signaler un bug ou comportement inattendu
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire avec le plus de détails possible.

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Décris clairement le comportement observé.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Observer '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexte
      description: Navigateur, OS, rôle utilisateur (membre, référent, admin)

  - type: checkboxes
    id: security
    attributes:
      label: Impact sécurité potentiel ?
      options:
        - label: Ce bug pourrait avoir un impact sur la sécurité ou les données personnelles
